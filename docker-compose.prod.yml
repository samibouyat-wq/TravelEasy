version: '3.9'

# Override pour la production — utiliser avec :
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    image: ${DOCKER_REGISTRY:-ghcr.io}/samibouyat-wq/ouicooly-backend:${IMAGE_TAG:-latest}
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes: []  # Pas de montage de code source en prod
    environment:
      DEBUG: "false"
      APP_ENV: production

  frontend:
    image: ${DOCKER_REGISTRY:-ghcr.io}/samibouyat-wq/ouicooly-frontend:${IMAGE_TAG:-latest}
    restart: always

  nginx:
    image: ${DOCKER_REGISTRY:-ghcr.io}/samibouyat-wq/ouicooly-nginx:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot

  db:
    restart: always
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data_prod:/data

volumes:
  postgres_data_prod:
  redis_data_prod:
  certbot_data:
