version: '3.9'

services:
  # ─── Base de données ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ouicooly_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ouicooly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ouicooly_password}
      POSTGRES_DB: ${POSTGRES_DB:-ouicooly_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ouicooly}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (cache + pub/sub) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ouicooly_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend FastAPI ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ouicooly_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ouicooly}:${POSTGRES_PASSWORD:-ouicooly_password}@db:5432/${POSTGRES_DB:-ouicooly_db}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Frontend Flutter Web ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ouicooly_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ─── Nginx reverse proxy ────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ouicooly_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

  # ─── PgAdmin (dev only) ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ouicooly_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ouicooly.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
