name: traveleasy
description: Application agence de voyage IA — Mobile & Web
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP & API
  dio: ^5.4.2

  # Stockage local
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # UI
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Liens externes (Stripe redirect)
  url_launcher: ^6.3.0

  # Utilitaires
  equatable: ^2.0.5
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
