name: traveleasy
description: Application agence de voyage IA — Mobile & Web
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # HTTP & API
  dio: ^5.4.2

  # Authentification Firebase
  firebase_core: ^2.30.1
  firebase_auth: ^4.19.4
  google_sign_in: ^6.2.1

  # Stockage local
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Paiement
  flutter_stripe: ^10.1.1

  # Notifications push
  firebase_messaging: ^14.9.3
  flutter_local_notifications: ^17.1.2

  # Cartes
  google_maps_flutter: ^2.7.0

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  intl: 0.18.1

  # Utilitaires
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.3.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
